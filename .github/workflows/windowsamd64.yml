name: " Custom Windows Amd64 "

on:
  workflow_call:
    inputs:
      build-id:
        description: 'Identifier for workflows and caching'
        type: string
        required: true
      cpm-cache-version:
        description: 'CPM Cache Version'
        type: string
        required: true
      devel:
        description: 'Development mode (disables update checker)'
        type: string
        required: true
      force_pgo:
        description: 'Force PGO builds'
        type: string
        required: true

env:
  DISABLE_ARM: ${{ vars.DISABLE_ARM }}
  SCCACHE_GHA_ENABLED: "true"
  CCACHE: "true"
  FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
  DEVEL: ${{ inputs.devel }}
  BUILD_ID: ${{ inputs.build-id }}

jobs:
  windows:
    name: "Windows ${{ matrix.os.arch }} ${{ matrix.compiler.program }} ${{ matrix.compiler.target }}"
    runs-on: ${{ matrix.os.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - runs-on: windows-latest
            arch: amd64
        compiler:
          - program: msvc
            target: standard

    env:
      TARGET: ${{ matrix.os.arch }}
      COMPILER: "${{ matrix.compiler.program }}"
      PGO_TARGET: "${{ matrix.compiler.target }}"
      ARCH: ${{ matrix.os.arch }}-${{ matrix.compiler.program }}-${{ matrix.compiler.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/workflows/setup
        with:
          key: ${{ runner.os }}-${{ matrix.os.arch }}-${{ matrix.compiler.program }}
          version: ${{ inputs.cpm-cache-version }}

      - name: Load payload environment
        shell: bash
        run: . ./.ci/fj/load-env.sh

      - name: Set up MSVC
        uses: Eden-CI/msvc-dev-cmd@master
        with:
          arch: ${{ matrix.os.arch }}

      - name: Install Vulkan SDK
        shell: powershell
        run: ./.ci/windows/install-vulkan-sdk.ps1

      - name: Configure
        shell: bash
        run: |
          git config --global core.autocrlf off
          dos2unix .patch/boost/*
          ./.ci/common/configure.sh -DCCACHE_PATH=${SCCACHE_PATH}

      - name: Build
        shell: bash
        run: cmake --build build

      - name: Package
        shell: bash
        run: ./.ci/windows/packagecustom.sh
        env:
          ARCH: ${{ env.FORGEJO_NREV }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-${{ env.ARCH }}-eden-${{ env.FORGEJO_NREV }}
          path: artifacts/*
          archive: false
